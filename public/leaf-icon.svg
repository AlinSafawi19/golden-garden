    <ellipse cx="0" cy="-8" rx="3" ry="8" fill="#E8634A" transform="rotate(-27)"/>
    <ellipse cx="0" cy="-10" rx="4" ry="10" fill="#E8634A"/>
    <ellipse cx="0" cy="-8" rx="3" ry="8" fill="#E8634A" transform="rotate(27)"/>
    <line x1="0" y1="1" x2="0" y2="4" stroke="#E8634A" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
