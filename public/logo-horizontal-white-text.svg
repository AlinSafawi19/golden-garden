<svg xmlns="http://www.w3.org/2000/svg" viewBox="27 0 263 130">
  <title>Golden Garden — Horizontal Footer Logo (White + Mint on Transparent)</title>

  <!-- Botanical mark -->
  <g transform="translate(55, 68)">
    <ellipse cx="0" cy="-24" rx="9" ry="24" fill="#FFFFFF" transform="rotate(-27)"/>
    <ellipse cx="0" cy="-30" rx="11" ry="30" fill="#FFFFFF"/>
    <ellipse cx="0" cy="-24" rx="9" ry="24" fill="#FFFFFF" transform="rotate(27)"/>
    <line x1="0" y1="-3" x2="0" y2="-57" stroke="#A9FFCA" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="1" x2="0" y2="9" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Vertical mint divider -->
  <line x1="108" y1="25" x2="108" y2="105" stroke="#A9FFCA" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="125" y="60"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="20" font-weight="500" fill="#FFFFFF"
        text-anchor="start" textLength="130" lengthAdjust="spacing">GOLDEN</text>
  <text x="125" y="88"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="20" font-weight="500" fill="#FFFFFF"
        text-anchor="start" textLength="130" lengthAdjust="spacing">GARDEN</text>
</svg>
