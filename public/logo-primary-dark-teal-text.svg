<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <title>Golden Garden — Primary Logo</title>

  <!-- Botanical mark: three-leaf sprig radiating from a single base -->
  <g transform="translate(150, 83)">
    <!-- Left leaf -->
    <ellipse cx="0" cy="-29" rx="11" ry="29" fill="#033040" transform="rotate(-27)"/>
    <!-- Center leaf (tallest) -->
    <ellipse cx="0" cy="-36" rx="13" ry="36" fill="#033040"/>
    <!-- Right leaf -->
    <ellipse cx="0" cy="-29" rx="11" ry="29" fill="#033040" transform="rotate(27)"/>
    <!-- Mint midrib — visible vein on center leaf -->
    <line x1="0" y1="-4" x2="0" y2="-68" stroke="#A9FFCA" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Stem -->
    <line x1="0" y1="1" x2="0" y2="11" stroke="#033040" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Mint accent divider -->
  <line x1="95" y1="110" x2="205" y2="110" stroke="#A9FFCA" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="150" y="138"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="20" font-weight="500" fill="#033040"
        text-anchor="middle" textLength="110" lengthAdjust="spacing">GOLDEN</text>
  <text x="150" y="166"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="20" font-weight="500" fill="#033040"
        text-anchor="middle" textLength="110" lengthAdjust="spacing">GARDEN</text>
</svg>
